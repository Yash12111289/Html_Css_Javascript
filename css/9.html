<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color: red;
        }
        .a{
            width: 600px;
            height: 600px;
            background-color: black;
        }
        @media(max-width:500px){
            .a{
                width: 50px;
                height: 50px;
                background-color: green;
            }
            h1{
                color: green;
            }
        }
    </style>
</head>
<body>
    <h1>@media</h1>
    <img src="image.png" alt="_blank" class="a">
</body>
</html>
