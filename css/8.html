<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    text-align: center;
}
div{
    height: 100px;
    width: 100px;
    display: inline-block;
    border: 2px solid black;
}
.container{
    width: 800px;
    height: 200px;
    display: flex;
    /* flex-direction: row-reverse; */
    /* flex-direction: row; */
    /* flex-direction: column-reverse; */
    flex-direction: column;
    /* flex properties */
    justify-content: space-evenly;
    flex-wrap: wrap;
    align-items: center;
    align-content:center;
    flex-grow: inherit;
    flex-shrink: inherit;
}
#b1{
    background-color: violet;
    align-self: flex-end;
}
#b2{
    background-color: indigo;
}
#b3{
    background-color: blue;
}
#b4{
    background-color: green;
}
#b5{
    background-color: yellow;
}
    </style>
</head>
<body>
    <h1>flex box</h1>
    <div class="container">
        <div id="b1">box1</div>
        <div id="b2">box2</div>
        <div id="b3">box3</div>
        <div id="b4">box4</div>
        <div id="b5">box5</div>
    </div>
</body>
</html>
