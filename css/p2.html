<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Times New Roman', Times, serif;
        }
        .a>h1{
            text-align: center;
        }
        .a>p{
            text-transform: uppercase;
        }
        #outer{
            font-size: 25px;
        }
        #outer>#inner{
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="a">
        <h1>heading</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Hic culpa ullam magni animi odio! Voluptates voluptas officia, consectetur sapiente iusto illo? Quisquam delectus odio adipisci mollitia dignissimos, vitae quas odit?</p>
    </div>
    <div id="outer">
        <p>outer</p>
        <div id="inner">
            <p>inner</p>
        </div>
    </div>
</body>
</html>
